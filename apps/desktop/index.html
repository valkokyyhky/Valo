<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      html body {
        background: #f8f8f8;
      }
      html[data-theme='dark'] body {
        background-color: #000;
      }
      #loading-screen {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: inherit;
        gap: 12px;
      }
      @keyframes loading-draw {
        0% { stroke-dashoffset: 1000; }
        100% { stroke-dashoffset: 0; }
      }
      @keyframes loading-fill {
        30% { fill-opacity: 0.05; }
        100% { fill-opacity: 1; }
      }
      #loading-brand {
        display: flex;
        align-items: center;
        gap: 12px;
        color: #1f1f1f;
      }
      #loading-brand svg path {
        fill: currentcolor;
        fill-opacity: 0;
        stroke: currentcolor;
        stroke-dasharray: 1000;
        stroke-dashoffset: 1000;
        stroke-width: 0.25em;
        animation:
          loading-draw 2s cubic-bezier(0.4, 0, 0.2, 1) infinite,
          loading-fill 2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      }
      html[data-theme='dark'] #loading-brand {
        color: #f0f0f0;
      }
    </style>
  </head>
  <body style="height: 100%">
    <script>
      (function () {
        var theme = 'system';
        try {
          theme = localStorage.getItem('theme') || 'system';
        } catch (_) {}
        var systemTheme =
          window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
            ? 'dark'
            : 'light';
        var resolvedTheme = theme === 'system' ? systemTheme : theme;
        if (resolvedTheme === 'dark' || resolvedTheme === 'light') {
          document.documentElement.setAttribute('data-theme', resolvedTheme);
        }
        var locale = navigator.language || 'en-US';
        document.documentElement.lang = locale;
        var rtl = ['ar', 'arc', 'dv', 'fa', 'ha', 'he', 'khw', 'ks', 'ku', 'ps', 'ur', 'yi'];
        document.documentElement.dir =
          rtl.indexOf(locale.split('-')[0].toLowerCase()) >= 0 ? 'rtl' : 'ltr';
      })();
    </script>
    <div id="loading-screen">
      <div id="loading-brand" aria-label="Loading" role="status" style="display: flex; flex-direction: column; align-items: center; gap: 20px;">
        <!-- 你的 Logo -->
        <img 
          src="/icons/icon-192x192.png" 
          alt="Valo" 
          style="width: 64px; height: 64px; animation: float 2s ease-in-out infinite;"
        />
        <!-- 加载文字 -->
        <div style="display: flex; gap: 4px; font-size: 16px; color: var(--color-text, #666);">
          <span style="animation: dot 1.4s ease-in-out infinite">l</span>
          <span style="animation: dot 1.4s ease-in-out infinite 0.2s">o</span>
          <span style="animation: dot 1.4s ease-in-out infinite 0.4s">a</span>
          <span style="animation: dot 1.4s ease-in-out infinite 0.6s">d</span>
          <span style="animation: dot 1.4s ease-in-out infinite 0.8s">i</span>
          <span style="animation: dot 1.4s ease-in-out infinite 1.0s">n</span>
          <span style="animation: dot 1.4s ease-in-out infinite 1.2s">g</span>
          <span style="margin-left: 4px; animation: dot 1.4s ease-in-out infinite 1.4s">...</span>
        </div>
      </div>
    </div>
    
    <style>
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-8px); }
      }
      
      @keyframes dot {
        0%, 100% { opacity: 0.2; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.1); }
      }
    </style>
    <div id="root" style="height: 100%;"></div>
    <script>
      window.__SERVER_CONFIG__ = undefined;
    </script>
    <script type="module" src="../../src/spa/entry.desktop.tsx"></script>
  </body>
</html>
